services:
  db:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_DB: exercise
      POSTGRES_USER: exercise
      POSTGRES_PASSWORD: exercise
    ports:
      - "5432:5432"
    volumes:
      - exercise_db:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exercise -d exercise"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://exercise:exercise@db:5432/exercise
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  exercise_db:
